services:
  backend:
    build:
      context: .
      dockerfile: src/BookGuess.Api/Dockerfile
    container_name: bookguess-backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=bookguess;User=bookguess;Password=${MYSQL_PASSWORD};
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=BookGuess
      - Jwt__Audience=BookGuess
      - AIService__BaseUrl=http://ai-service:8080
      - Cors__AllowedOrigins=http://frontend:80,http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bookguess

  ai-service:
    build:
      context: .
      dockerfile: src/BookGuess.AIService/Dockerfile
    container_name: bookguess-ai
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Claude__ApiKey=${CLAUDE_API_KEY}
      - Qdrant__Host=qdrant
      - Qdrant__Port=6334
      - Embeddings__Provider=ollama
      - Embeddings__OllamaUrl=http://ollama:11434
      - Embeddings__Model=all-minilm
    depends_on:
      - qdrant
    restart: unless-stopped
    networks:
      - bookguess

  mysql:
    image: mysql:8.0
    container_name: bookguess-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=bookguess
      - MYSQL_USER=bookguess
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "bookguess", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bookguess

  qdrant:
    image: qdrant/qdrant:latest
    container_name: bookguess-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - bookguess

  frontend:
    build:
      context: .
      dockerfile: src/BookGuess.Web/Dockerfile
    container_name: bookguess-frontend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ApiBaseUrl=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - bookguess

  nginx:
    image: nginx:alpine
    container_name: bookguess-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - bookguess

volumes:
  mysql_data:
  qdrant_data:

networks:
  bookguess:
    driver: bridge
